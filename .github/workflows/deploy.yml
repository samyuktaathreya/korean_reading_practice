name: Deploy FastAPI to Droplet

# This tells the robot to wake up whenever you push to the 'main' branch 
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into Droplet and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Go to your project folder (adjust if your repo root is different)
            cd ~/korean_reading_practice
            
            # 2. Pull the latest code from GitHub
            git pull origin main
            
            # 3. Go to the backend folder where the Dockerfile is
            cd myapp/backend
            
            # 4. Build the new Docker image
            docker build -t korean-backend .
            
            # 5. Stop and delete the old container (don't crash if it doesn't exist yet)
            docker rm -f my-app || true
            
            # 6. Run the fresh container!
            docker run -d -p 80:8000 --init --name my-app korean-backend