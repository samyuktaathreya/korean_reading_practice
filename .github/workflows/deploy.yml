name: Deploy Full Stack to Droplet

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into Droplet and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Go to your project root
            cd ~/korean_reading_practice
            
            # 2. Pull the latest code (both frontend and backend)
            git pull origin main
            
            # 3. Shut down any old containers gracefully
            docker-compose down || true
            
            # 4. Build and start both new containers in the background
            docker-compose up --build -d
            
            # 5. Clean up old dangling images to save your 20GB disk space!
            docker image prune -f