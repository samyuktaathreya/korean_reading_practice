server {
    listen 80;

    # 1. Serve the React app for all normal traffic
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # This prevents React Router from breaking on refresh
    }

    # 2. Forward any /api/ requests to the Python backend
    location /api/ {
        proxy_pass http://backend:8000/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}